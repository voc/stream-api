name: CI

on:
  push:
    tags: v.*
    branches: master

jobs:
  release:
    runs-on: "ubuntu-latest"
    steps:
    - uses: actions/checkout@v2

    - name: Set up Go
      uses: actions/setup-go@v2
      with:
        go-version: 1.26

    - name: Build
      run: |
        mkdir -p monitor/frontend/public
        touch monitor/frontend/public/buildme
        make build

    - name: Test
      run: make test
